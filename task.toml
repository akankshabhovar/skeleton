version = "2.0"

[metadata]
author_name = "scaffold"
difficulty = "unknown"
category = "security"
subcategories = [
    "api_integration",
    "db_interaction",
]
number_of_milestones = 0
codebase_size = "small"
languages = [
    "javascript",
    "sql",
]
tags = [
    "openssl",
    "cms-signature",
    "key-rotation",
    "express",
    "duckdb",
    "reconciliation",
    "idempotency",
]

[environment]
os = "linux"
allow_internet = false
build_timeout_sec = 600
cpus = 2
memory_mb = 4096
storage_mb = 10240
workdir = "/app"

[verifier]
timeout_sec = 300
environment_mode = "shared"

[agent]
timeout_sec = 900
