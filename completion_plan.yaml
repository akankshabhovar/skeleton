- id: tests
  status: generated
  produced:
  - path: tests/test.sh
  - path: tests/test_outputs.py
  acceptance:
  - Tests fail on a naive publisher that signs with the revoked key (UNTRUSTED_SIGNATURE)
    or skips reconciliation.
  - Tests pass on a correct publisher that reconciles, signs with the current key,
    submits, and persists receipts.
  - Verifier applies a binary 0/1 reward only.
  - Verifier runs identical logic for the oracle and the candidate.
  - No test asserts a bundle ordering beyond the deterministic ordering the instruction
    requires.
  open_questions:
  - Which columns constitute a 'duplicate manifest row' that must be collapsed during
    reconciliation (identical (entry_id) vs. identical across every column)? Only the
    exact-across-all-columns invariant is graded.
  - What is the exact rule by which a withdrawal cancels a prior build — supersede by
    entry_id, must sizes/versions match, are partial withdrawals possible? Only the
    bundle-membership invariant is graded.
  reference: https://www.harborframework.com/docs/tasks
- id: solution
  status: missing
  produced: []
  needed:
  - A stub entrypoint solution/publish.sh exists; the reference publisher/release-publisher.mjs
    is authored and graded separately by a human and is NOT included in this folder.
  acceptance:
  - A reference publisher run in the built container makes tests/test.sh exit zero.
  - The reference solution signs with the current key so no submission is rejected
    as UNTRUSTED_SIGNATURE.
  open_questions: []
  reference: https://www.harborframework.com/docs/tasks
seed:
  task_description: 'Release bundles are being rejected with UNTRUSTED_SIGNATURE after
    release engineering rotated the firmware code-signing key. A JavaScript background
    publisher must import the build manifest CSV into DuckDB, reconcile withdrawn builds
    and duplicate manifest rows with SQL, sign canonical release descriptors using OpenSSL,
    and submit them to the included Express distribution gateway. The publisher records
    gateway receipts and request tokens in the database, then emits deterministic status
    lines that are checked against CLI output snapshots.'
  metadata:
    os: linux
    timeouts:
      build_seconds: 600
      run_seconds: 300
    emit_process_rubric: false
